services:

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports: ["8001:8000"]
    env_file: .env
    depends_on: [redis]
    volumes:
      - ./media:/app/media
      - ./output:/app/output
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    depends_on: [redis, backend]
    volumes:
      - ./media:/app/media
      - ./output:/app/output
    restart: unless-stopped
    command: python scheduler.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["3001:80"]
    depends_on: [backend]
    restart: unless-stopped